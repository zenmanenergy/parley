; Parley peripheral node firmware
; Requires ESP32-S3 modules with 16MB flash (e.g. N16R8).
;
; One PlatformIO environment per node type. All environments share the
; node_template library and the same partition table. The factory environment
; produces the minimal recovery firmware that lives in the factory partition.
;
; Build a specific environment:   pio run -e factory
; Upload over USB:                pio run -e factory -t upload

[platformio]
default_envs = factory

; --- Shared base configuration ---
[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.flash_mode = qio

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7

; --- Factory recovery firmware ---
; Minimal image: WiFi, MQTT, OTA receive only. No application logic.
; This environment produces the binary that gets written to the factory
; partition during initial USB provisioning and is never updated OTA.
; lib_ignore excludes node_template so factory/main.cpp can define its own
; setup() and loop() without a linker conflict.
[env:factory]
build_src_filter = +<factory/*>
lib_ignore = node_template
build_flags =
    -DFACTORY_BUILD
    -DFACTORY_FW_VERSION='"factory-1.0.0"'

; --- Application node environments ---
; Each node type gets its own environment. All share node_template (auto-
; discovered from lib/node_template/). The template defines setup() and loop();
; application code only implements the plugin interface from node_template.h.
;
; Add a new node type by copying one of these blocks and changing the name
; and src_filter. The template handles WiFi, MQTT, OTA, watchdog, boot counter,
; validation gate, and heartbeats — application code only needs to implement
; setup_peripheral(), loop_peripheral(), peripheral_health_check(), and
; peripheral_handle_command().

; Template for future node environments:
; [env:imu_node]
; build_src_filter = +<imu_node/*>
; build_flags =
;     -DAPP_FW_VERSION='"imu-1.0.0"'

; --- Unit Testing ---
; Run tests: pio test -e test
; Runs all test files in test/ directory using native platform or esp32 simulator
[env:test]
platform = native
build_src_filter = +<test/*>
lib_deps =
    Unity @ 2.5.0
build_flags =
    -DUNITY_SETUP_HEAP_SIZE_BYTES=65536
