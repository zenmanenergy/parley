; Parley gateway node firmware
; Requires ESP32-S3 with native USB (e.g. DevKitC-1 or any N16R8 module with USB-OTG).
;
; The gateway presents a CDC-ECM network interface to the Pi over USB, so the Pi
; gets a standard network interface (usb0) and the gateway routes traffic between
; the peripheral WiFi AP and that USB link.
;
; sdkconfig.defaults enables lwIP IP forwarding and NAT (required for routing).
;
; Two environments:
;   gateway  — main application firmware (OTA-updatable via A/B slots)
;   factory  — minimal USB-recovery firmware (written to factory partition once,
;              never updated OTA; Pi can reflash via esptool.py if needed)
;
; Build application:   pio run -e gateway
; Build factory:       pio run -e factory
; Upload:              pio run -e gateway -t upload

[platformio]
default_envs = gateway

[env:gateway]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Only compile src/main.cpp — src/factory/ is a separate build environment.
build_src_filter = +<main.cpp>

board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.flash_mode = qio

; native USB is the OTG port on the ESP32-S3, not the UART bridge
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; sdkconfig.defaults applies at CMake configure time and enables:
;   - lwIP IP forwarding (CONFIG_LWIP_IP_FORWARD)
;   - lwIP IPv4 NAPT    (CONFIG_LWIP_IPV4_NAPT)
;   - TinyUSB device stack for CDC-ECM (CONFIG_TINYUSB_*)
board_build.sdkconfig_options =
    CONFIG_LWIP_IP_FORWARD=y
    CONFIG_LWIP_IPV4_NAPT=y

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7

build_flags =
    -DGATEWAY_FW_VERSION='"gateway-1.0.0"'
    ; Uncomment to enable verbose debug output over USB serial
    ; -DGATEWAY_DEBUG

; --- Gateway factory recovery firmware ---
; Minimal image: USB CDC-ACM serial to Pi, waits for Pi to push new application
; firmware via esptool.py or a custom OTA-over-serial protocol.
; Written to the factory partition during initial provisioning; never updated OTA.
[env:factory]
build_src_filter = +<factory/*>
build_flags =
    -DGATEWAY_FACTORY_BUILD
    -DGATEWAY_FACTORY_FW_VERSION='"gw-factory-1.0.0"'
