<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" fill="#1a1a2e" rx="10"/>
  
  <!-- Skull -->
  <ellipse cx="50" cy="35" rx="20" ry="22" fill="#f5f5f5" stroke="#000" stroke-width="1.5"/>
  
  <!-- Jaw -->
  <ellipse cx="50" cy="55" rx="16" ry="12" fill="#e8e8e8" stroke="#000" stroke-width="1.5"/>
  
  <!-- Eye sockets -->
  <circle cx="42" cy="32" r="5" fill="#000"/>
  <circle cx="58" cy="32" r="5" fill="#000"/>
  
  <!-- Nose hole -->
  <ellipse cx="50" cy="42" rx="3" ry="4" fill="#000"/>
  
  <!-- Teeth line -->
  <line x1="38" y1="50" x2="62" y2="50" stroke="#000" stroke-width="1"/>
  
  <!-- Crossbones behind skull -->
  <g stroke="#f5f5f5" stroke-width="3" fill="none" stroke-linecap="round">
    <line x1="25" y1="55" x2="75" y2="55"/>
    <line x1="35" y1="45" x2="65" y2="65"/>
  </g>
  
  <!-- Bone ends -->
  <circle cx="25" cy="55" r="4" fill="#f5f5f5" stroke="#000" stroke-width="1"/>
  <circle cx="75" cy="55" r="4" fill="#f5f5f5" stroke="#000" stroke-width="1"/>
  <circle cx="35" cy="45" r="4" fill="#f5f5f5" stroke="#000" stroke-width="1"/>
  <circle cx="65" cy="65" r="4" fill="#f5f5f5" stroke="#000" stroke-width="1"/>
  
  <!-- Eye patch for extra pirate style -->
  <circle cx="42" cy="32" r="7" fill="#000" opacity="0.3"/>
</svg>
